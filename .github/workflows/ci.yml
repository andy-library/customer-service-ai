name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Job id/name "test" is the required status check for PR merges.
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install microservice-framework (local m2)
        # Parent POM is not on Maven Central; install from public GitHub source.
        run: bash ./scripts/install-framework.sh
        env:
          FRAMEWORK_CLONE_DIR: ${{ runner.temp }}/microservice-framework

      - name: Unit tests
        run: mvn -B test
        env:
          # Keep CI offline from external LLM/Dify; unit tests use mocks.
          MAVEN_OPTS: "-Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn"

  secrets-hygiene:
    name: secrets-hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan tracked files for high-risk secrets
        run: bash ./scripts/ci-secret-scan.sh
