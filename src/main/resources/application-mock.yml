# Offline / CI profile — deterministic models + in-memory vector store (no external LLM).
spring:
  main:
    allow-bean-definition-overriding: true
  ai:
    openai:
      api-key: mock-key
      base-url: http://127.0.0.1:9
    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: 1024

csai:
  model-source: local
  knowledge:
    provider: none
  security:
    enabled: false
    rate-limit:
      enabled: false
  guardrail:
    require-evidence: false
    block-injection-patterns: false
  router:
    handoff-on-unknown: false
    confidence-threshold: 0.0

logging:
  level:
    com.enterprise.csai: DEBUG
