<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>知识库管理</title>
  <link rel="stylesheet" th:href="@{/admin/app.css}"/>
</head>
<body>
<div class="layout">
  <div class="nav">
    <div class="brand">知识库</div>
    <a th:href="@{/admin}">首页</a>
    <a th:href="@{/admin/knowledge}">知识库</a>
    <a th:href="@{/admin/chat}">对话测试</a>
    <a th:href="@{/admin/models}">模型与路由</a>
  </div>

  <div class="card">
    <h1>上传文档</h1>
    <p th:if="${message}" class="flash-ok" th:text="${message}"></p>
    <p th:if="${error}" class="flash-err" th:text="${error}"></p>
    <form th:action="@{/admin/knowledge/upload}" method="post" enctype="multipart/form-data">
      <div class="row">
        <div>
          <label>标题（可选）</label>
          <input type="text" name="title" placeholder="例如：退款政策"/>
        </div>
        <div>
          <label>文件（pdf / md / txt）</label>
          <input type="file" name="file" required/>
        </div>
        <div>
          <label>&nbsp;</label>
          <button type="submit">上传并索引</button>
        </div>
      </div>
    </form>
  </div>

  <div class="card">
    <h2>文档列表</h2>
    <table>
      <thead>
      <tr>
        <th>标题</th>
        <th>文件名</th>
        <th>状态</th>
        <th>分块</th>
        <th>操作</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="doc : ${documents}">
        <td th:text="${doc.title}">title</td>
        <td th:text="${doc.filename}">file</td>
        <td th:text="${doc.status}">INDEXED</td>
        <td th:text="${doc.chunkCount}">0</td>
        <td>
          <form th:action="@{/admin/knowledge/delete}" method="post" style="display:inline">
            <input type="hidden" name="id" th:value="${doc.id}"/>
            <button type="submit" class="danger">删除</button>
          </form>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(documents)}">
        <td colspan="5" class="muted">暂无文档，请先上传。</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
