<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>知识库管理</title>
  <link rel="stylesheet" th:href="@{/admin/app.css}"/>
</head>
<body>
<div class="layout">
  <div class="nav">
    <div class="brand">知识库</div>
    <a th:href="@{/admin}">首页</a>
    <a th:href="@{/admin/knowledge}">知识库</a>
    <a th:href="@{/admin/chat}">对话测试</a>
    <a th:href="@{/admin/models}">模型与路由</a>
  </div>

  <div class="card">
    <h1>知识库</h1>
    <p class="muted">
      检索提供方：<span class="mono" th:text="${knowledgeProvider}">dify</span>
      · 模型源：<span class="mono" th:text="${modelSource}">local</span>
    </p>
    <p th:if="${message}" class="flash-ok" th:text="${message}"></p>
    <p th:if="${error}" class="flash-err" th:text="${error}"></p>

    <div th:if="${knowledgeProvider == 'dify'}">
      <p>企业知识库由 <strong>Dify</strong> 管理（文档上传/切分/索引在 Dify 完成）。</p>
      <p class="muted">API：
        <span class="mono" th:text="${difyBaseUrl}">http://127.0.0.1/v1</span>
        · Dataset 已配置：
        <span th:text="${difyDatasetConfigured}">false</span>
      </p>
      <form th:action="@{/admin/knowledge/search}" method="post">
        <label>检索调试（调用 Dify retrieve）</label>
        <div class="row">
          <div><input type="text" name="query" placeholder="输入问题关键词" required th:value="${searchQuery}"/></div>
          <div><label>&nbsp;</label><button type="submit">检索</button></div>
        </div>
      </form>
      <div th:if="${searchHits != null}" style="margin-top:12px">
        <h3>命中</h3>
        <table>
          <thead><tr><th>标题</th><th>分数</th><th>内容</th></tr></thead>
          <tbody>
          <tr th:each="h : ${searchHits}">
            <td th:text="${h.title}">t</td>
            <td th:text="${h.score}">0</td>
            <td th:text="${h.content}">c</td>
          </tr>
          <tr th:if="${#lists.isEmpty(searchHits)}"><td colspan="3" class="muted">无命中</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div th:if="${localIngest}">
    <h2>本地上传（provider=local）</h2>
    <form th:action="@{/admin/knowledge/upload}" method="post" enctype="multipart/form-data">
      <div class="row">
        <div>
          <label>标题（可选）</label>
          <input type="text" name="title" placeholder="例如：退款政策"/>
        </div>
        <div>
          <label>文件（pdf / md / txt）</label>
          <input type="file" name="file" required/>
        </div>
        <div>
          <label>&nbsp;</label>
          <button type="submit">上传并索引</button>
        </div>
      </div>
    </form>
    </div>
  </div>

  <div class="card" th:if="${localIngest}">
    <h2>文档列表</h2>
    <table>
      <thead>
      <tr>
        <th>标题</th>
        <th>文件名</th>
        <th>状态</th>
        <th>分块</th>
        <th>操作</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="doc : ${documents}">
        <td th:text="${doc.title}">title</td>
        <td th:text="${doc.filename}">file</td>
        <td th:text="${doc.status}">INDEXED</td>
        <td th:text="${doc.chunkCount}">0</td>
        <td>
          <form th:action="@{/admin/knowledge/delete}" method="post" style="display:inline">
            <input type="hidden" name="id" th:value="${doc.id}"/>
            <button type="submit" class="danger">删除</button>
          </form>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(documents)}">
        <td colspan="5" class="muted">暂无文档，请先上传。</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
